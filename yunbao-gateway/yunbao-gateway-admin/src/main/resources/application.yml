server:
  port: 8000
  shutdown: GRACEFUL

spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  application:
    name: @project.artifactId@
  profiles:
    active: @pom.profile.name@
  cache:
    type: REDIS
  data:
    redis:
      database: 1
      host: @pom.redis.ip@
      port: @pom.redis.port@
      password: @pom.redis.password@
  cloud:
    nacos:
      config:
        server-addr: @pom.nacos.addresses@
        namespace: @pom.nacos.namespace@
        enabled: true
        file-extension: yml
        refresh-enabled: true
      discovery:
        server-addr: @pom.nacos.addresses@
        namespace: @pom.nacos.namespace@
        enabled: true
    gateway:
      routes:
        - id: yunbao-service-admin
          uri: lb://yunbao-service-admin
          predicates:
            - Path=/api/admin/**
        - id: yunbao-service-oms
          uri: lb://yunbao-service-oms
          predicates:
            - Path=/api/oms/**
        - id: yunbao-service-tms
          uri: lb://yunbao-service-tms
          predicates:
            - Path=/api/tms/**
auth:
  ignores:
    - /api/admin/admin/auth-admin-login
